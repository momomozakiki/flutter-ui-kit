name: flutter_ui_kit_example
description: "Component viewer for flutter_ui_kit — a gallery of every Ui* component."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # The design system under review — its own only runtime dependency is the
  # Flutter SDK, so this viewer stays dependency-clean too (path dep on the kit).
  flutter_ui_kit:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
